# deployment.yaml
 apps/apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-service
  namespace: hackathon
  labels:
    app: hackathon  # Konsa app hai
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hackathon-app  # Match: Selector = Template Label
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hackathon-app # Match:
      annotations:
        # Prometheus setup
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8080"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "hackathon-role" #  Vault
        vault.hashicorp.com/agent-inject-secret-db: "secret/hackathon-app/db"
        vault.hashicorp.com/agent-inject-secret-oauth: "secret/hackathon-app/oauth"
    spec:
      containers:
        - name: order-service
          image: hac/order-service:1.0.0
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 60
