global:
  scrape_interval: 15s

# Point Prometheus to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093  # Alertmanager address

rule_files:
  - "alert_rules.yaml"

scrape_configs:
  - job_name: 'spring-boot-app'
    static_configs:
      - targets: ['localhost:8086']
    metrics_path: '/actuator/prometheus'
