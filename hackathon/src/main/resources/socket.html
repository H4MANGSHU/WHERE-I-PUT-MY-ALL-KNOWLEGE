<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SockJS + STOMP v7 Debugger</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .card { max-width: 800px; margin: auto; background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; background: #020617; color: white; border: 1px solid #475569; border-radius: 6px; outline: none; font-family: monospace; }
        input:focus { border-color: #38bdf8; }
        button { padding: 10px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-conn { background: #38bdf8; color: #0f172a; }
        .btn-disc { background: #ef4444; color: white; }
        .btn-send { background: #22c55e; color: white; }
        #log { height: 400px; background: #000; margin-top: 20px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid #334155; border-radius: 8px; line-height: 1.5; }
        .log-entry { margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }
        .err { color: #f87171; } .in { color: #38bdf8; } .out { color: #4ade80; } .sys { color: #94a3b8; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #22c55e; } .offline { background: #ef4444; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>STOMP v7 + SockJS Debugger</h3>
        <div>
            <span id="status-dot" class="status-dot offline"></span>
            <span id="status-text" style="font-size: 12px; color: #94a3b8;">Disconnected</span>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="url" value="http://localhost:8086/ws-stomp">
        <button id="conn-btn" class="btn-conn" onclick="toggleConnect()">Connect</button>
    </div>

    <div class="input-group">
        <input type="text" id="dest" value="/app/chat.send" style="flex: 0.3;" placeholder="Destination">
        <input type="text" id="msg" value='{"chatId":"himangshu", "content":"Hello!"}' placeholder="JSON Message">
        <button class="btn-send" onclick="send()">Send</button>
    </div>

    <div id="log">
        <div class="log-entry sys">1. Update @SpringBootApplication(exclude={DataSourceAutoConfiguration.class})</div>
        <div class="log-entry sys">2. Set .withSockJS() in WebSocketConfig.java</div>
        <div class="log-entry sys">3. Ensure URL starts with http:// for SockJS</div>
    </div>
</div>

<script>
    let stompClient = null;

    function log(text, cls) {
        const d = document.createElement('div');
        d.className = `log-entry ${cls}`;
        d.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
        const l = document.getElementById('log');
        l.appendChild(d);
        l.scrollTop = l.scrollHeight;
    }

    function toggleConnect() {
        if (stompClient && stompClient.active) {
            stompClient.deactivate();
        } else {
            connect();
        }
    }

    function connect() {
        const url = document.getElementById('url').value;
        log("Connecting via SockJS: " + url, "sys");

        stompClient = new StompJs.Client({
            // SockJS requires webSocketFactory instead of brokerURL
            webSocketFactory: () => new SockJS(url),
            reconnectDelay: 5000,
            heartbeatIncoming: 4000,
            heartbeatOutgoing: 4000,
            debug: (str) => {
                if(str.includes("PONG") || str.includes("PING")) return; // Hide heartbeats
                console.log(str);
            }
        });

        stompClient.onConnect = (frame) => {
            updateStatus(true);
            log("CONNECTED TO SERVER", "out");

            // Subscribe logic - change path to match your @SendTo or broker
            stompClient.subscribe('/topic/room', (message) => {
                log("RECEIVED: " + message.body, "in");
            });
        };

        stompClient.onStompError = (frame) => {
            log("STOMP ERROR: " + frame.headers['message'], "err");
        };

        stompClient.onWebSocketClose = () => {
            updateStatus(false);
            log("CONNECTION CLOSED", "err");
        };

        stompClient.activate();
    }

    function updateStatus(connected) {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        const btn = document.getElementById('conn-btn');

        if (connected) {
            dot.className = "status-dot online";
            txt.innerText = "Connected";
            btn.innerText = "Disconnect";
            btn.className = "btn-disc";
        } else {
            dot.className = "status-dot offline";
            txt.innerText = "Disconnected";
            btn.innerText = "Connect";
            btn.className = "btn-conn";
        }
    }

    function send() {
        const destination = document.getElementById('dest').value;
        const messageBody = document.getElementById('msg').value;

        if (stompClient && stompClient.connected) {
            stompClient.publish({
                destination: destination,
                body: messageBody
            });
            log("SENT to " + destination + ": " + messageBody, "out");
        } else {
            log("ERROR: Connect first!", "err");
        }
    }
</script>

</body>
</html>
